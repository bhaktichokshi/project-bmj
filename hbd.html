<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday, Bhrugu!</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:         #060D18;
      --blue:       #1C4590;
      --blue-shine: #5E96D6;
      --text:       #EBF0F9;
      --text-muted: #7A98B8;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    canvas#confetti {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 40px 28px;
      max-width: 660px;
    }

    .heading {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: clamp(3.2rem, 11vw, 7.5rem);
      line-height: 0.92;
      text-transform: uppercase;
      letter-spacing: 0.01em;
      color: var(--text);
      animation: up 0.75s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    .sub {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: clamp(1.6rem, 5vw, 3rem);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--blue-shine);
      margin-top: 1rem;
      animation: up 0.75s 0.12s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: rgba(94, 150, 214, 0.35);
      margin: 2rem auto;
      animation: up 0.75s 0.24s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    .message {
      font-size: clamp(1rem, 2.5vw, 1.125rem);
      line-height: 1.85;
      color: var(--text-muted);
      animation: up 0.75s 0.36s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    .message p { margin-bottom: 0.3rem; }
    .message p:last-child { margin-bottom: 0; }

    .back {
      display: inline-block;
      margin-top: 2.75rem;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--blue-shine);
      text-decoration: none;
      border-bottom: 1px solid rgba(94, 150, 214, 0.35);
      padding-bottom: 3px;
      transition: color 0.2s, border-color 0.2s;
      animation: up 0.75s 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
    }

    .back:hover {
      color: var(--text);
      border-color: rgba(235, 240, 249, 0.4);
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <canvas id="confetti"></canvas>

  <div class="page">
    <h1 class="heading">Happy Birthday,<br>baby!</h1>
    <p class="sub">Happy 25th.</p>
    <div class="divider"></div>
    <div class="message">
      <p>Welcome to your world.</p>
      <p>Still under construction.</p>
      <p>But I'll be backing you up.</p>
    </div>
    <a href="/" class="back">projectbmj.com &rarr;</a>
  </div>

  <script>
    const canvas = document.getElementById('confetti');
    const ctx    = canvas.getContext('2d');

    // F1 podium palette: Ferrari red, McLaren papaya, Mercedes teal,
    // gold, champagne, white, silver, Portofino blue
    const colors = [
      '#E8002D', '#FF8000', '#00D2BE',
      '#FFD700', '#F5C842', '#FFFFFF',
      '#C8C8C8', '#2E65BB', '#5E96D6'
    ];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Piece {
      constructor(scatter) {
        this.reset(scatter);
      }

      reset(scatter) {
        this.x        = Math.random() * canvas.width;
        this.y        = scatter ? Math.random() * canvas.height * 1.2 - canvas.height * 0.2 : -16;
        this.w        = Math.random() * 9 + 5;
        this.h        = Math.random() * 5 + 2.5;
        this.color    = colors[Math.floor(Math.random() * colors.length)];
        this.speed    = Math.random() * 2.2 + 1.4;
        this.drift    = (Math.random() - 0.5) * 1.2;
        this.rotation = Math.random() * Math.PI * 2;
        this.spin     = (Math.random() - 0.5) * 0.11;
        this.opacity  = Math.random() * 0.3 + 0.7;
        this.wave     = Math.random() * Math.PI * 2;
        this.waveAmp  = Math.random() * 0.7 + 0.2;
      }

      update() {
        this.wave      += 0.022;
        this.y         += this.speed;
        this.x         += this.drift + Math.sin(this.wave) * this.waveAmp;
        this.rotation  += this.spin;
        if (this.y > canvas.height + 20) this.reset(false);
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.fillStyle = this.color;
        ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
        ctx.restore();
      }
    }

    const pieces = Array.from({ length: 280 }, () => new Piece(true));

    (function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    })();
  </script>

</body>
</html>
